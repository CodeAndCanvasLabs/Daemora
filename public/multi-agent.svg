<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#58a6ff"/></marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f0883e"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3fb950"/></marker>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d2a8ff"/></marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Multi-Agent - Parallel Sub-Agents + Teams</text>

  <!-- Divider labels -->
  <text x="250" y="62" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">PARALLEL SUB-AGENTS</text>
  <text x="680" y="62" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="700">AGENT TEAMS</text>
  <line x1="470" y1="50" x2="470" y2="500" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Parallel Sub-Agents -->
  <!-- Main Agent -->
  <rect x="40" y="82" width="120" height="44" rx="8" fill="#1a2332" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="108" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">Main Agent</text>

  <!-- parallelAgents call -->
  <line x1="160" y1="104" x2="210" y2="104" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="96" text-anchor="middle" fill="#8b949e" font-size="9">parallel</text>

  <!-- SubAgentManager -->
  <rect x="212" y="82" width="140" height="44" rx="8" fill="#1a2332" stroke="#f0883e" stroke-width="1.5"/>
  <text x="282" y="102" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">SubAgent</text>
  <text x="282" y="116" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Manager</text>

  <!-- Spawn arrows -->
  <line x1="282" y1="126" x2="120" y2="168" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="282" y1="126" x2="240" y2="168" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="282" y1="126" x2="360" y2="168" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- Concurrent agents -->
  <rect x="50" y="170" width="130" height="60" rx="8" fill="#1a2332" stroke="#3fb950" stroke-width="1.2"/>
  <text x="115" y="194" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Researcher A</text>
  <text x="115" y="210" text-anchor="middle" fill="#8b949e" font-size="9">webSearch + webFetch</text>

  <rect x="195" y="170" width="130" height="60" rx="8" fill="#1a2332" stroke="#3fb950" stroke-width="1.2"/>
  <text x="260" y="194" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Researcher B</text>
  <text x="260" y="210" text-anchor="middle" fill="#8b949e" font-size="9">webSearch + webFetch</text>

  <rect x="340" y="170" width="110" height="60" rx="8" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="395" y="194" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Writer</text>
  <text x="395" y="210" text-anchor="middle" fill="#8b949e" font-size="9">draft + structure</text>

  <!-- Concurrent bracket -->
  <rect x="42" y="160" width="416" height="78" rx="10" fill="none" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="252" text-anchor="middle" fill="#3fb950" font-size="10">concurrent execution - results merge back to main agent</text>

  <!-- Return to main -->
  <path d="M 250,238 L 250,270 L 100,270 L 100,290" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Coder sequential -->
  <rect x="40" y="292" width="120" height="44" rx="8" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="100" y="318" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Coder</text>
  <text x="100" y="332" text-anchor="middle" fill="#8b949e" font-size="9">saves report</text>

  <!-- Model routing note -->
  <rect x="40" y="360" width="410" height="36" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="245" y="383" text-anchor="middle" fill="#8b949e" font-size="9">Model: explicit → profile route → SUB_AGENT_MODEL → parent → default</text>

  <!-- Persistent sessions -->
  <rect x="40" y="408" width="410" height="36" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="245" y="431" text-anchor="middle" fill="#8b949e" font-size="9">Persistent sessions: user123--researcher, user123--coder — context across tasks</text>

  <!-- RIGHT: Agent Teams -->
  <!-- Team creation -->
  <rect x="510" y="82" width="140" height="44" rx="8" fill="#1a2332" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="580" y="102" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="600">createTeam</text>
  <text x="580" y="116" text-anchor="middle" fill="#8b949e" font-size="9">+ addTeammate(s)</text>

  <!-- Arrow to task list -->
  <line x1="580" y1="126" x2="580" y2="150" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- Shared Task List -->
  <rect x="510" y="152" width="140" height="44" rx="8" fill="#1a2332" stroke="#f0883e" stroke-width="1.5"/>
  <text x="580" y="172" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Shared TaskList</text>
  <text x="580" y="186" text-anchor="middle" fill="#8b949e" font-size="9">claim → work → complete</text>

  <!-- Arrow to spawnAll -->
  <line x1="580" y1="196" x2="580" y2="218" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- spawnAll -->
  <rect x="526" y="220" width="108" height="32" rx="6" fill="#1a2332" stroke="#3fb950" stroke-width="1.2"/>
  <text x="580" y="241" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">spawnAll</text>

  <!-- Teammate agents -->
  <line x1="526" y1="252" x2="526" y2="275" stroke="#3fb950" stroke-width="1.2" marker-end="url(#arrG)"/>
  <line x1="580" y1="252" x2="580" y2="275" stroke="#3fb950" stroke-width="1.2" marker-end="url(#arrG)"/>
  <line x1="634" y1="252" x2="700" y2="275" stroke="#3fb950" stroke-width="1.2" marker-end="url(#arrG)"/>

  <rect x="490" y="278" width="80" height="44" rx="8" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="530" y="304" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">Coder</text>

  <rect x="580" y="278" width="80" height="44" rx="8" fill="#1a2332" stroke="#3fb950" stroke-width="1.2"/>
  <text x="620" y="304" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">Researcher</text>

  <rect x="670" y="278" width="80" height="44" rx="8" fill="#1a2332" stroke="#f0883e" stroke-width="1.2"/>
  <text x="710" y="304" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="600">Writer</text>

  <!-- Mailbox -->
  <rect x="490" y="340" width="260" height="44" rx="8" fill="#1a2332" stroke="#d2a8ff" stroke-width="1.2"/>
  <text x="620" y="360" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="600">Mailbox - Inter-Agent Messaging</text>
  <text x="620" y="376" text-anchor="middle" fill="#8b949e" font-size="9">sendMessage · broadcast · readMail</text>

  <!-- Connecting lines to mailbox -->
  <line x1="530" y1="322" x2="530" y2="338" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="620" y1="322" x2="620" y2="338" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="710" y1="322" x2="710" y2="338" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- When to use -->
  <rect x="490" y="400" width="260" height="56" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="620" y="420" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">When to use which?</text>
  <text x="620" y="436" text-anchor="middle" fill="#8b949e" font-size="9">parallelAgents → independent tasks, no coordination</text>
  <text x="620" y="450" text-anchor="middle" fill="#8b949e" font-size="9">teams → shared tasks, dependencies, messaging</text>

  <!-- Limits -->
  <rect x="490" y="466" width="260" height="28" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="620" y="485" text-anchor="middle" fill="#8b949e" font-size="9">Max 5 teams · 10 teammates · 7 sub-agents · Depth 3</text>
</svg>