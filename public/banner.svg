<svg width="3840" height="1200" viewBox="0 0 3840 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3840" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050118"/>
      <stop offset="30%" stop-color="#080822"/>
      <stop offset="50%" stop-color="#0a0a2a"/>
      <stop offset="70%" stop-color="#080822"/>
      <stop offset="100%" stop-color="#050118"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e8f4ff"/>
      <stop offset="70%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>

    <linearGradient id="taglineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="80" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="logoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="40%" stop-color="#ff4458"/>
      <stop offset="100%" stop-color="#aa1122" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4458" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff4458" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="50" y1="2" x2="50" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0812"/>
      <stop offset="100%" stop-color="#060308"/>
    </linearGradient>
    <linearGradient id="lstroke" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4458"/>
      <stop offset="55%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#ff4458"/>
    </linearGradient>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="3840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4458" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff4458" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#ff4458" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4458" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4458" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff4458" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#4ECDC4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="centerOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="3840" height="1200" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.025">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d9ff" stroke-width="0.5"/>
    </pattern>
    <rect width="3840" height="1200" fill="url(#grid)"/>
  </g>

  <!-- Ambient orbs -->
  <ellipse cx="1200" cy="600" rx="800" ry="500" fill="url(#centerOrb)"/>
  <ellipse cx="600" cy="400" rx="500" ry="400" fill="#ff4458" opacity="0.02" filter="url(#softGlow)"/>
  <ellipse cx="3200" cy="400" rx="500" ry="400" fill="#00d9ff" opacity="0.025" filter="url(#softGlow)"/>
  <ellipse cx="1920" cy="900" rx="600" ry="300" fill="#4ECDC4" opacity="0.015" filter="url(#softGlow)"/>

  <!-- Horizontal accent lines -->
  <line x1="200" y1="200" x2="3640" y2="200" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="1000" x2="3640" y2="1000" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner accents -->
  <g opacity="0.15">
    <line x1="80" y1="80" x2="200" y2="80" stroke="#00d9ff" stroke-width="1.5"/>
    <line x1="80" y1="80" x2="80" y2="200" stroke="#00d9ff" stroke-width="1.5"/>
    <line x1="3760" y1="80" x2="3640" y2="80" stroke="#00d9ff" stroke-width="1.5"/>
    <line x1="3760" y1="80" x2="3760" y2="200" stroke="#00d9ff" stroke-width="1.5"/>
    <line x1="80" y1="1120" x2="200" y2="1120" stroke="#ff4458" stroke-width="1.5"/>
    <line x1="80" y1="1120" x2="80" y2="1000" stroke="#ff4458" stroke-width="1.5"/>
    <line x1="3760" y1="1120" x2="3640" y2="1120" stroke="#ff4458" stroke-width="1.5"/>
    <line x1="3760" y1="1120" x2="3760" y2="1000" stroke="#ff4458" stroke-width="1.5"/>
  </g>

  <!-- ═══ LOGO (left) + TEXT (right) ═══ centered as a group -->
  <!-- Logo at ~x=1050, Text starts ~x=1500 -->

  <!-- Logo glow behind -->
  <ellipse cx="1250" cy="480" rx="220" ry="220" fill="#ff4458" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Logo scaled 4x at center-left -->
  <g transform="translate(1050, 280) scale(4)">
    <!-- Left horn -->
    <polygon points="30,28 22,6 38,22" fill="#ff4458" opacity="0.85" filter="url(#edge)"/>
    <polygon points="30,28 22,6 38,22" fill="none" stroke="#ff4458" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Right horn -->
    <polygon points="70,28 78,6 62,22" fill="#ff4458" opacity="0.85" filter="url(#edge)"/>
    <polygon points="70,28 78,6 62,22" fill="none" stroke="#ff4458" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Main face -->
    <polygon points="30,28 70,28 84,40 88,60 76,80 62,92 50,96 38,92 24,80 12,60 16,40" fill="url(#body)" stroke="url(#lstroke)" stroke-width="1.8" filter="url(#edge)"/>
    <!-- Inner bevel -->
    <polygon points="33,33 67,33 79,43 82,61 72,78 61,88 50,91 39,88 28,78 18,61 21,43" fill="none" stroke="#ff4458" stroke-width="0.4" stroke-opacity="0.18"/>
    <!-- Brow ridges -->
    <line x1="22" y1="46" x2="44" y2="53" stroke="#ff4458" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="78" y1="46" x2="56" y2="53" stroke="#ff4458" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="36" y1="50" x2="44" y2="53" stroke="#ff4458" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="64" y1="50" x2="56" y2="53" stroke="#ff4458" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
    <!-- Eye bloom -->
    <ellipse cx="50" cy="62" rx="26" ry="12" fill="url(#eyeglow)"/>
    <!-- Eye socket -->
    <ellipse cx="50" cy="62" rx="22" ry="11" fill="#050208"/>
    <ellipse cx="50" cy="62" rx="22" ry="11" fill="none" stroke="#ff4458" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Iris -->
    <ellipse cx="50" cy="62" rx="14" ry="8" fill="url(#eye)" filter="url(#bloom)"/>
    <!-- Pupil -->
    <ellipse cx="50" cy="62" rx="3.5" ry="7.5" fill="#000"/>
    <!-- Eye highlight -->
    <ellipse cx="46" cy="58" rx="2" ry="1.2" fill="white" fill-opacity="0.4"/>
    <!-- Scan line -->
    <line x1="28" y1="62" x2="72" y2="62" stroke="#ff6a00" stroke-width="0.7" stroke-opacity="0.3"/>
    <!-- Chin marks -->
    <line x1="44" y1="81" x2="50" y2="86" stroke="#ff4458" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.55"/>
    <line x1="56" y1="81" x2="50" y2="86" stroke="#ff4458" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.55"/>
    <!-- Temple accents -->
    <circle cx="20" cy="60" r="1.5" fill="#00d9ff" opacity="0.7"/>
    <circle cx="80" cy="60" r="1.5" fill="#00d9ff" opacity="0.7"/>
    <line x1="22" y1="60" x2="28" y2="62" stroke="#00d9ff" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="78" y1="60" x2="72" y2="62" stroke="#00d9ff" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- Horn tip dots -->
    <circle cx="22" cy="6" r="2" fill="#ff4458" opacity="0.9"/>
    <circle cx="78" cy="6" r="2" fill="#ff4458" opacity="0.9"/>
    <!-- Eye pulse ring -->
    <ellipse cx="50" cy="62" rx="18" ry="10" fill="none" stroke="#ff4458" stroke-width="0.6" stroke-opacity="0.15"/>
  </g>

  <!-- DAEMORA text -->
  <text x="1520" y="530" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-weight="900" font-size="200" letter-spacing="20" fill="url(#textGrad)" filter="url(#textGlow)">DAEMORA</text>

  <!-- Tagline -->
  <text x="1530" y="610" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-weight="500" font-size="42" fill="url(#taglineGrad)" letter-spacing="12">AUTONOMOUS  AI  AGENT</text>

  <!-- Divider line under tagline -->
  <line x1="1530" y1="645" x2="2700" y2="645" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Feature pills -->
  <g font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="26" font-weight="600">
    <rect x="600" y="1050" width="240" height="56" rx="28" fill="#ff4458" fill-opacity="0.08" stroke="#ff4458" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="720" y="1086" text-anchor="middle" fill="#ff4458">60+ Tools</text>

    <rect x="900" y="1050" width="280" height="56" rx="28" fill="#00d9ff" fill-opacity="0.08" stroke="#00d9ff" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="1040" y="1086" text-anchor="middle" fill="#00d9ff">22 Channels</text>

    <rect x="1240" y="1050" width="290" height="56" rx="28" fill="#4ECDC4" fill-opacity="0.08" stroke="#4ECDC4" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="1385" y="1086" text-anchor="middle" fill="#4ECDC4">Multi-Tenant</text>

    <rect x="1590" y="1050" width="350" height="56" rx="28" fill="#00ff88" fill-opacity="0.08" stroke="#00ff88" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="1765" y="1086" text-anchor="middle" fill="#00ff88">10 Security Layers</text>

    <rect x="2000" y="1050" width="300" height="56" rx="28" fill="#ffaa00" fill-opacity="0.08" stroke="#ffaa00" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="2150" y="1086" text-anchor="middle" fill="#ffaa00">4 AI Providers</text>

    <rect x="2360" y="1050" width="280" height="56" rx="28" fill="#ff00ff" fill-opacity="0.08" stroke="#ff00ff" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="2500" y="1086" text-anchor="middle" fill="#ff00ff">MCP Ready</text>

    <rect x="2700" y="1050" width="280" height="56" rx="28" fill="#ff6a00" fill-opacity="0.08" stroke="#ff6a00" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="2840" y="1086" text-anchor="middle" fill="#ff6a00">Open Source</text>
  </g>

  <!-- Subtle border -->
  <rect x="3" y="3" width="3834" height="1194" rx="20" ry="20" fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
</svg>
