<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  @keyframes pulse { 0%,100% { opacity: .3; transform: scale(.8) } 50% { opacity: 1; transform: scale(1.2) } }
  @keyframes spin { to { transform: rotate(360deg) } }
  .box { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .title { font-size: 24px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, #00d9ff, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .dots { display: flex; gap: 6px; margin-top: 8px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: #00d9ff; animation: pulse 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  .status { font-size: 12px; color: #4a5568; letter-spacing: 1px; font-family: monospace; margin-top: 4px; }
  .logo { animation: spin 20s linear infinite; }
</style>
</head>
<body>
<div class="box">
  <svg class="logo" width="64" height="64" viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="28" stroke="#00d9ff" stroke-width="2" opacity="0.6"/>
    <circle cx="32" cy="32" r="18" stroke="#4ECDC4" stroke-width="1.5" opacity="0.3"/>
    <circle cx="32" cy="32" r="6" fill="#00d9ff" opacity="0.8">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </svg>
  <div class="title">DAEMORA</div>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="status" id="status">Starting services...</div>
</div>

<script>
  // Poll for Daemora to be ready, then navigate to it.
  // This runs in the splash window (tauri://localhost). Once Daemora is up,
  // we use location.href to navigate — WKWebView handles this as a normal
  // same-process navigation, which works reliably.

  var statusEl = document.getElementById('status');
  var ipc = null;

  function waitForIpc(cb) {
    var tries = 0;
    var iv = setInterval(function() {
      tries++;
      if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) {
        clearInterval(iv);
        cb(window.__TAURI_INTERNALS__);
      } else if (tries > 100) {
        clearInterval(iv);
        statusEl.textContent = 'Tauri IPC unavailable';
      }
    }, 50);
  }

  function pollAndNavigate(port) {
    var url = 'http://127.0.0.1:' + port + '/';
    statusEl.textContent = 'Connecting to Daemora...';
    var tries = 0;
    var iv = setInterval(function() {
      tries++;
      fetch(url, { method: 'GET', mode: 'no-cors' })
        .then(function() {
          clearInterval(iv);
          statusEl.textContent = 'Loading UI...';
          setTimeout(function() { window.location.href = url; }, 100);
        })
        .catch(function() {
          if (tries > 60) {
            clearInterval(iv);
            statusEl.textContent = 'Daemora did not respond';
            statusEl.style.color = '#ff4444';
          }
        });
    }, 500);
  }

  waitForIpc(function(t) {
    t.invoke('get_status').then(function(s) {
      if (s && s.daemora_port) {
        pollAndNavigate(s.daemora_port);
      } else {
        statusEl.textContent = 'Waiting for services...';
        // Retry
        var retry = setInterval(function() {
          t.invoke('get_status').then(function(s2) {
            if (s2 && s2.daemora_port) {
              clearInterval(retry);
              pollAndNavigate(s2.daemora_port);
            }
          });
        }, 1000);
      }
    });
  });
</script>
</body>
</html>
