<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daemora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  @keyframes pulse { 0%,100% { opacity: .3; transform: scale(.8) } 50% { opacity: 1; transform: scale(1.2) } }
  @keyframes spin { to { transform: rotate(360deg) } }
  .box { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .title { font-size: 24px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, #00d9ff, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .dots { display: flex; gap: 6px; margin-top: 8px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: #00d9ff; animation: pulse 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  .status { font-size: 12px; color: #4a5568; letter-spacing: 1px; font-family: monospace; margin-top: 4px; }
  .logo { animation: spin 20s linear infinite; }
  .vault { display: none; flex-direction: column; align-items: center; gap: 10px; margin-top: 12px; }
  .vault label { font-size: 12px; color: #8899aa; }
  .vault form { display: flex; gap: 8px; align-items: center; }
  .vault input { padding: 10px 14px; background: #131b2e; border: 1px solid #1e2d45; border-radius: 8px; color: #e2e8f0; font-size: 14px; width: 240px; outline: none; font-family: monospace; transition: border-color 0.2s; }
  .vault input:focus { border-color: #00d9ff; box-shadow: 0 0 0 2px rgba(0,217,255,0.15); }
  .vault button.primary { padding: 10px 20px; background: linear-gradient(135deg, #00d9ff, #4ECDC4); color: #0a0f1a; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
  .vault button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .vault .skip { background: none; border: none; color: #4a5568; font-size: 11px; cursor: pointer; text-decoration: underline; }
  .vault .err { font-size: 11px; color: #ff4444; min-height: 13px; }
</style>
</head>
<body>
<div class="box">
  <svg class="logo" width="64" height="64" viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="28" stroke="#00d9ff" stroke-width="2" opacity="0.6"/>
    <circle cx="32" cy="32" r="18" stroke="#4ECDC4" stroke-width="1.5" opacity="0.3"/>
    <circle cx="32" cy="32" r="6" fill="#00d9ff" opacity="0.8">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </svg>
  <div class="title">DAEMORA</div>
  <div class="dots" id="dots"><span></span><span></span><span></span></div>
  <div class="status" id="status">Starting services...</div>

  <div class="vault" id="vault">
    <label>Vault detected — enter your passphrase</label>
    <form id="vaultForm">
      <input id="vaultInput" type="password" placeholder="Passphrase" autocomplete="off" />
      <button class="primary" id="vaultBtn" type="submit">Unlock</button>
    </form>
    <div class="err" id="vaultErr"></div>
    <button class="skip" id="vaultSkip">Skip (start without vault)</button>
  </div>
</div>

<script>
  // Boot flow:
  //   1. Wait for Tauri IPC.
  //   2. If a passphrase is saved in the OS keychain, use it silently.
  //   3. Else, if a vault exists on disk, show the passphrase form.
  //   4. Once services are up, navigate to Daemora.

  var statusEl = document.getElementById('status');
  var dotsEl = document.getElementById('dots');
  var vaultEl = document.getElementById('vault');
  var inputEl = document.getElementById('vaultInput');
  var btnEl = document.getElementById('vaultBtn');
  var errEl = document.getElementById('vaultErr');
  var skipEl = document.getElementById('vaultSkip');
  var formEl = document.getElementById('vaultForm');

  function showStatus(msg) { statusEl.textContent = msg; statusEl.style.display = 'block'; dotsEl.style.display = 'flex'; vaultEl.style.display = 'none'; }
  function showVault() { vaultEl.style.display = 'flex'; statusEl.style.display = 'none'; dotsEl.style.display = 'none'; setTimeout(function(){ inputEl.focus(); }, 50); }
  function fail(msg) { statusEl.textContent = msg; statusEl.style.color = '#ff4444'; dotsEl.style.display = 'none'; }

  function waitForIpc(cb) {
    var tries = 0;
    var iv = setInterval(function() {
      tries++;
      if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) { clearInterval(iv); cb(window.__TAURI_INTERNALS__); }
      else if (tries > 100) { clearInterval(iv); fail('Tauri IPC unavailable'); }
    }, 50);
  }

  function pollAndNavigate(port) {
    var url = 'http://127.0.0.1:' + port + '/';
    showStatus('Connecting to Daemora...');
    var tries = 0;
    var iv = setInterval(function() {
      tries++;
      fetch(url, { method: 'GET', mode: 'no-cors' })
        .then(function() {
          clearInterval(iv);
          showStatus('Loading UI...');
          setTimeout(function() { window.location.href = url; }, 100);
        })
        .catch(function() {
          if (tries > 60) { clearInterval(iv); fail('Daemora did not respond'); }
        });
    }, 500);
  }

  function onServicesReady(status) {
    if (status && status.daemora_port) pollAndNavigate(status.daemora_port);
    else fail('No Daemora port returned');
  }

  waitForIpc(function(t) {
    t.invoke('has_saved_passphrase').catch(function() { return false; }).then(function(hasSaved) {
      if (hasSaved) {
        showStatus('Unlocking from keychain...');
        t.invoke('unlock_with_saved')
          .then(onServicesReady)
          .catch(function(err) {
            console.warn('[Splash] saved passphrase rejected:', err);
            bootWithoutSaved(t);
          });
      } else {
        bootWithoutSaved(t);
      }
    });
  });

  function bootWithoutSaved(t) {
    t.invoke('check_vault').then(function(vaultExists) {
      if (vaultExists) {
        showVault();
      } else {
        showStatus('Starting without vault...');
        t.invoke('start_without_vault').then(onServicesReady).catch(function(e) { fail('Failed: ' + e); });
      }
    }).catch(function(e) { fail('check_vault failed: ' + e); });
  }

  formEl.addEventListener('submit', function(e) {
    e.preventDefault();
    var t = window.__TAURI_INTERNALS__;
    var p = inputEl.value;
    if (!p) return;
    btnEl.disabled = true; btnEl.textContent = 'Unlocking...';
    errEl.textContent = '';
    t.invoke('submit_passphrase', { passphrase: p })
      .then(function(status) { onServicesReady(status); })
      .catch(function(err) {
        btnEl.disabled = false; btnEl.textContent = 'Unlock';
        errEl.textContent = String(err);
      });
  });

  skipEl.addEventListener('click', function() {
    var t = window.__TAURI_INTERNALS__;
    showStatus('Starting without vault...');
    t.invoke('start_without_vault').then(onServicesReady).catch(function(e) { fail('Failed: ' + e); });
  });
</script>
</body>
</html>
